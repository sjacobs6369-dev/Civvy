name: Deploy to GitHub Pages

# Builds the Vite app and publishes it to GitHub Pages on every push to the
# draft branch (and on manual dispatch). Enable once in the repo:
#   Settings -> Pages -> Build and deployment -> Source: "GitHub Actions".

on:
  push:
    branches:
      - claude/app-vision-blueprint-draft-eqidwl
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Base path must match the repo name so assets resolve under /<repo>/.
      - run: npm run build
        env:
          BASE_PATH: /${{ github.event.repository.name }}/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
